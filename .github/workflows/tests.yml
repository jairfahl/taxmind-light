name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    name: Unit Tests (sem banco)
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: "postgresql://taxmind:taxmind123@localhost:5432/taxmind_db"
      ANTHROPIC_API_KEY: "sk-ant-fake-for-ci"
      VOYAGE_API_KEY: "pa-fake-for-ci"
      JWT_SECRET: "ci-test-jwt-secret-not-for-production-use"
      API_INTERNAL_KEY: "ci-test-internal-key"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: pip install -r requirements.txt pytest

      - name: Run unit tests (excluindo integration e e2e)
        run: |
          python -m pytest tests/ \
            --ignore=tests/integration \
            --ignore=tests/e2e \
            -v --tb=short -q
