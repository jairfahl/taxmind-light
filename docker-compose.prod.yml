services:
  db:
    container_name: tribus-ai-db
    image: pgvector/pgvector:pg16
    env_file: .env.prod
    volumes:
      - taxmind_pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    command: >
      postgres
      -c max_connections=200
      -c tcp_keepalives_idle=30
      -c tcp_keepalives_interval=10
      -c statement_timeout=60000
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      retries: 5
    restart: always
    networks:
      - tribus-ai-net

  api:
    container_name: tribus-ai-api
    build: .
    command: uvicorn src.api.main:app --host 0.0.0.0 --port 8000 --workers 2
    restart: always
    ports:
      - "127.0.0.1:8020:8000"
    env_file: .env.prod
    environment:
      - DATABASE_URL=postgresql://taxmind:${POSTGRES_PASSWORD}@db:5432/taxmind_db
      - API_BASE_URL=http://api:8000
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/v1/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - tribus-ai-net

  ui:
    container_name: tribus-ai-ui
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=https://orbis.tax/api
    restart: always
    ports:
      - "127.0.0.1:8521:3000"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/ > /dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - tribus-ai-net

volumes:
  taxmind_pgdata:
    external: true

networks:
  tribus-ai-net:
    name: tribus-ai-net
