services:
  db:
    container_name: tribus-ai-db
    image: pgvector/pgvector:pg16
    env_file: .env.prod
    volumes:
      - taxmind_pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    command: >
      postgres
      -c max_connections=200
      -c tcp_keepalives_idle=30
      -c tcp_keepalives_interval=10
      -c statement_timeout=60000
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      retries: 5
    restart: always
    networks:
      - tribus-ai-net

  api:
    container_name: tribus-ai-api
    build: .
    command: uvicorn src.api.main:app --host 0.0.0.0 --port 8000 --workers 2
    restart: always
    env_file: .env.prod
    environment:
      - DATABASE_URL=postgresql://taxmind:${POSTGRES_PASSWORD}@db:5432/taxmind_db
      - API_BASE_URL=http://api:8000
    depends_on:
      db:
        condition: service_healthy
    networks:
      - tribus-ai-net

  ui:
    container_name: tribus-ai-ui
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=https://orbis.tax/api
        - NEXT_PUBLIC_API_INTERNAL_KEY=${API_INTERNAL_KEY}
    restart: always
    depends_on:
      - api
    networks:
      - tribus-ai-net

  nginx:
    image: nginx:alpine
    container_name: tribus-ai-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    depends_on:
      - api
      - ui
    networks:
      - tribus-ai-net

volumes:
  taxmind_pgdata:
    external: true

networks:
  tribus-ai-net:
    name: tribus-ai-net
