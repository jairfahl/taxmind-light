events { worker_connections 1024; }

http {
  # Redirect HTTP → HTTPS
  server {
    listen 80;
    server_name tribus-ai.com.br www.tribus-ai.com.br tribus-ia.com.br www.tribus-ia.com.br;
    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://tribus-ai.com.br$request_uri; }
  }

  server {
    listen 443 ssl;
    server_name tribus-ai.com.br www.tribus-ai.com.br;

    ssl_certificate     /etc/letsencrypt/live/tribus-ai.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tribus-ai.com.br/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # FastAPI — strip /api prefix
    location /api/ {
      proxy_pass         http://api:8000/;
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_read_timeout 120s;
      client_max_body_size 55M;
    }

    # Next.js frontend
    location / {
      proxy_pass         http://ui:3000;
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade $http_upgrade;
      proxy_set_header   Connection 'upgrade';
      proxy_cache_bypass $http_upgrade;
    }
  }
}
